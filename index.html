<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مقيم القراءة المستقل</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #2563eb; --success: #22c55e; --danger: #ef4444; }
        body { font-family: sans-serif; background: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; width: 90%; max-width: 500px; padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; }
        #display-text { font-size: 1.8em; margin: 20px 0; color: #1e293b; }
        .word { display: inline-block; margin: 0 4px; color: #cbd5e1; transition: 0.3s; }
        .word.correct { color: var(--success); font-weight: bold; }
        .word.wrong { color: var(--danger); text-decoration: line-through; }
        button { background: var(--primary); color: white; border: none; padding: 15px 30px; font-size: 1.1em; border-radius: 50px; cursor: pointer; width: 100%; transition: 0.3s; }
        button:disabled { background: #94a3b8; }
        #status { font-size: 0.8em; color: #64748b; margin-top: 10px; }
        .progress-bar { height: 4px; background: #e2e8f0; border-radius: 2px; margin: 10px 0; display: none; }
        #fill { height: 100%; background: var(--primary); width: 0%; transition: 0.2s; }
    </style>
</head>
<body>

<div class="container">
    <div id="status">جاري تهيئة النظام...</div>
    <div class="progress-bar" id="p-bar"><div id="fill"></div></div>
    
    <div id="display-text"></div>
    <button id="record-btn" disabled>انتظر التحميل...</button>
    <p id="live-note" style="font-size: 0.8em; color: #666;"></p>
</div>

<script type="module">
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

    // تسجيل الخدمة للعمل أوفلاين
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    const text = "الحلم هو بداية كل انجاز عظيم";
    const words = text.split(' ');
    const display = document.getElementById('display-text');
    const btn = document.getElementById('record-btn');
    const status = document.getElementById('status');
    const fill = document.getElementById('fill');
    const pBar = document.getElementById('p-bar');

    words.forEach((w, i) => {
        const s = document.createElement('span');
        s.innerText = w; s.className = 'word'; s.id = `w-${i}`;
        display.appendChild(s);
    });

    let transcriber;
    async function init() {
        pBar.style.display = 'block';
        try {
            transcriber = await pipeline('automatic-speech-recognition', 'Xenova/whisper-base', {
                progress_callback: (p) => {
                    if(p.status === 'progress') {
                        fill.style.width = p.progress + '%';
                        status.innerText = `تحميل الذكاء الاصطناعي: ${Math.round(p.progress)}%`;
                    }
                    if(p.status === 'ready') {
                        status.innerText = "✅ جاهز تماماً (أوفلاين)";
                        pBar.style.display = 'none';
                        btn.disabled = false; btn.innerText = "ابدأ القراءة";
                    }
                }
            });
        } catch (e) { status.innerText = "خطأ في التحميل"; }
    }
    init();

    let recorder;
    btn.onclick = async () => {
        if (btn.innerText === "توقف") { recorder.stop(); return; }
        
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recorder = new MediaRecorder(stream);
        let chunks = [];
        
        recorder.onstart = () => {
            btn.innerText = "توقف";
            btn.style.background = "var(--danger)";
            document.querySelectorAll('.word').forEach(w => w.className = 'word');
        };

        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = async () => {
            btn.disabled = true; btn.innerText = "جاري التحليل...";
            const blob = new Blob(chunks, { type: 'audio/wav' });
            const out = await transcriber(URL.createObjectURL(blob), { language: 'arabic', task: 'transcribe' });
            
            const spoken = out.text.replace(/[^\u0621-\u064A\s]/g, "").split(/\s+/);
            words.forEach((w, i) => {
                const el = document.getElementById(`w-${i}`);
                const match = spoken.some(s => s.includes(w.replace(/[إأآا]/g, "ا")) || w.includes(s));
                el.className = match ? 'word correct' : 'word wrong';
            });

            btn.disabled = false; btn.innerText = "إعادة المحاولة"; btn.style.background = "var(--primary)";
            document.getElementById('live-note').innerText = "سمعت: " + out.text;
        };
        recorder.start();
    };
</script>
</body>
</html>
