<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مقيم القراءة الاحترافي اللحظي</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #22c55e;
            --danger: #ef4444;
            --text-main: #1e293b;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f8fafc;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background: white;
            max-width: 600px;
            width: 100%;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            text-align: center;
        }
        #status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-bottom: 20px;
            background: #fee2e2;
            color: #991b1b;
        }
        #display-text {
            font-size: 28px;
            line-height: 1.6;
            margin-bottom: 30px;
            padding: 20px;
            background: #f1f5f9;
            border-radius: 15px;
            min-height: 100px;
        }
        .word {
            display: inline-block;
            margin: 0 4px;
            color: #94a3b8; /* اللون الافتراضي رمادي قبل القراءة */
            transition: all 0.2s ease;
        }
        .word.correct { color: var(--success); font-weight: bold; transform: scale(1.1); }
        .word.wrong { color: var(--danger); text-decoration: underline; }
        .word.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.2em;
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        button:disabled { background: #cbd5e1; }
        #live-transcript {
            margin-top: 20px;
            font-size: 0.9em;
            color: #64748b;
            font-style: italic;
        }
        .loading-progress {
            height: 6px;
            width: 0%;
            background: var(--primary);
            position: absolute;
            top: 0; left: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="status-badge">جاري تهيئة الذكاء الاصطناعي...</div>
    
    <div id="display-text">
        </div>

    <button id="record-btn" disabled>انتظر التحميل...</button>
    
    <div id="live-transcript">تحدث ليظهر نصك هنا...</div>
</div>

<script type="module">
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

    const originalSentence = "الحلم هو بداية كل انجاز عظيم";
    const wordsArray = originalSentence.split(' ');
    
    const displayContainer = document.getElementById('display-text');
    const recordBtn = document.getElementById('record-btn');
    const statusBadge = document.getElementById('status-badge');
    const liveTranscript = document.getElementById('live-transcript');

    let transcriber;
    let isRecording = false;

    // 1. عرض النص مقسماً لكلمات
    wordsArray.forEach((word, index) => {
        const span = document.createElement('span');
        span.innerText = word;
        span.classList.add('word');
        span.id = `word-${index}`;
        displayContainer.appendChild(span);
    });

    // 2. تحميل المحرك
    async function initAI() {
        try {
            transcriber = await pipeline('automatic-speech-recognition', 'Xenova/whisper-tiny', {
                device: 'webgpu', // يحاول استخدام المعالج الرسومي للسرعة اللحظية
            });
            statusBadge.innerText = "✅ المحرك جاهز للتقييم اللحظي";
            statusBadge.style.background = "#dcfce7";
            statusBadge.style.color = "#166534";
            recordBtn.disabled = false;
            recordBtn.innerText = "ابدأ القراءة الآن";
        } catch (e) {
            statusBadge.innerText = "⚠️ وضع التوافق (أبطأ قليلاً)";
            transcriber = await pipeline('automatic-speech-recognition', 'Xenova/whisper-tiny');
            recordBtn.disabled = false;
        }
    }
    initAI();

    // 3. منطق التسجيل والمقارنة اللحظية
    let mediaRecorder;
    recordBtn.onclick = async () => {
        if (isRecording) {
            mediaRecorder.stop();
            return;
        }

        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        let audioChunks = [];

        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        
        mediaRecorder.onstart = () => {
            isRecording = true;
            recordBtn.innerText = "توقف";
            recordBtn.style.background = "#ef4444";
            resetColors();
        };

        mediaRecorder.onstop = async () => {
            isRecording = false;
            recordBtn.innerText = "تحليل نهائي...";
            const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
            const audioUrl = URL.createObjectURL(audioBlob);
            
            // معالجة النص
            const output = await transcriber(audioUrl, { 
                language: 'arabic',
                task: 'transcribe',
                chunk_length_s: 30,
                stride_length_s: 5
            });

            evaluateOutput(output.text);
            recordBtn.innerText = "إعادة المحاولة";
            recordBtn.style.background = "#2563eb";
            recordBtn.disabled = false;
        };

        mediaRecorder.start();
    };

    function evaluateOutput(text) {
        liveTranscript.innerText = "سمعت: " + text;
        const spokenWords = text.trim().split(/\s+/);
        
        wordsArray.forEach((originalWord, index) => {
            const wordElement = document.getElementById(`word-${index}`);
            const normalizedOriginal = normalize(originalWord);
            
            // البحث عن الكلمة في النص المسموع
            const found = spokenWords.some(sw => normalize(sw).includes(normalizedOriginal) || normalizedOriginal.includes(normalize(sw)));

            if (found) {
                wordElement.classList.add('correct');
                wordElement.classList.remove('wrong');
            } else {
                wordElement.classList.add('wrong');
                wordElement.classList.remove('correct');
            }
        });
    }

    function normalize(txt) {
        return txt.replace(/[إأآا]/g, "ا").replace(/ة/g, "ه").replace(/[^\u0621-\u064A]/g, "");
    }

    function resetColors() {
        document.querySelectorAll('.word').forEach(w => {
            w.classList.remove('correct', 'wrong', 'active');
        });
    }
</script>

</body>
</html>
